<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoanLens AI - Scan History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4 d-flex align-items-center gap-2" href="/">
        <i class="bi bi-file-earmark-medical-fill text-primary"></i> LoanLens AI
      </a>
      <div class="d-flex align-items-center gap-3 ms-auto">
        <ul class="navbar-nav d-flex flex-row gap-3">
          <li class="nav-item"><a class="nav-link text-white-50" href="/">Scan Loan</a></li>
          <li class="nav-item"><a class="nav-link active" href="/history.html">History</a></li>
        </ul>
        <button id="darkModeToggle" class="btn btn-outline-light btn-sm" aria-label="Toggle dark mode">
          <i id="darkModeIcon" class="bi bi-moon-fill"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="py-5 flex-grow-1">
    <div class="container" id="historyPageLayout">
      <h2 class="fw-bold mb-4 text-center">Scan History</h2>

      <div class="row g-3 mb-5 text-center">
        <div class="col-6 col-md-3">
          <div class="card card-premium p-3 bg-primary text-white border-0">
            <h6 class="mb-1 text-white-50 text-uppercase" style="font-size: 0.8rem;">Total Scans</h6>
            <h3 class="fw-bold mb-0" id="statTotal">0</h3>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card card-premium p-3 bg-success text-white border-0">
            <h6 class="mb-1 text-white-50 text-uppercase" style="font-size: 0.8rem;">Low Risk</h6>
            <h3 class="fw-bold mb-0" id="statLow">0</h3>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card card-premium p-3 bg-warning text-dark border-0">
            <h6 class="mb-1 text-dark-50 text-uppercase" style="font-size: 0.8rem;">Med Risk</h6>
            <h3 class="fw-bold mb-0" id="statMedium">0</h3>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card card-premium p-3 bg-danger text-white border-0">
            <h6 class="mb-1 text-white-50 text-uppercase" style="font-size: 0.8rem;">High/Predatory</h6>
            <h3 class="fw-bold mb-0" id="statHigh">0</h3>
          </div>
        </div>
        <div class="col-12 mt-3">
          <div class="card card-premium p-3 bg-light border-0">
            <h6 class="mb-1 text-muted text-uppercase" style="font-size: 0.8rem;">Average Health Score</h6>
            <h3 class="fw-bold mb-0 text-primary" id="statAvgHealth">0%</h3>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-8">
          <div class="input-group shadow-sm rounded-pill overflow-hidden bg-white border">
            <span class="input-group-text bg-white border-0 ps-3 text-muted"><i class="bi bi-search"></i></span>
            <input type="text" id="searchInput" class="form-control border-0 py-2 shadow-none" placeholder="Search by file name...">
          </div>
        </div>
        <div class="col-md-4">
          <select id="riskFilter" class="form-select py-2 shadow-sm rounded-pill border bg-white">
            <option value="all">All Risk Levels</option>
            <option value="low">Low Risk</option>
            <option value="medium">Medium Risk</option>
            <option value="high">High Risk</option>
            <option value="predatory">Predatory</option>
          </select>
        </div>
      </div>

      <div class="row g-4" id="scansGrid"></div>

      <div id="emptyState" class="text-center py-5 d-none">
        <i class="bi bi-archive-fill text-muted display-4 d-block mb-3"></i>
        <h4 class="fw-bold text-muted">No scans found</h4>
        <p class="text-muted">Analyze your first loan agreement to populate history records.</p>
        <a href="/" class="btn btn-primary rounded-pill px-4 mt-2">Scan Now</a>
      </div>

    </div>
  </main>

  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content shadow-lg border-0" style="border-radius: 16px;">
        <div class="modal-header border-bottom">
          <h5 class="modal-title fw-bold" id="modalTitle">Scan Report Details</h5>
          <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modalDetailContent"></div>
        <div class="modal-footer border-top">
          <button type="button" id="modalPrintBtn" class="btn btn-outline-primary rounded-pill px-4">
            <i class="bi bi-download"></i> Download Report
          </button>
          <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-dark text-white py-3 text-center mt-auto">
    <p class="mb-0">&copy; 2026 LoanLens AI. All rights reserved.</p>
  </footer>

  <script src="/js/renderShared.js"></script>
  <script src="/js/history.js"></script>
</body>
</html>
